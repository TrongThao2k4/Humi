<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Humi - Hộp thư</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/db.js"></script>
  <script src="../js/theme.js"></script>
  <script>(function(){var o=console.warn;console.warn=function(){var m=Array.prototype.join.call(arguments,' ');if(m.indexOf('cdn.tailwindcss.com should not be used in production')!==-1)return;return o.apply(console,arguments);};})();</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../css/hop-thu.css">
</head>
<body>
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div style="display:flex;align-items:center;gap:10px;padding:20px;border-bottom:1px solid #f5f5f8;">
      <div class="logo-mark" style="width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <span style="font-size:22px;font-weight:800;letter-spacing:-0.5px;color:#2A3547;">Humi</span>
    </div>
    <nav style="padding:12px;overflow-y:auto;">
      <p style="font-size:10px;font-weight:600;color:#7C8FAC;letter-spacing:0.1em;text-transform:uppercase;padding:0 12px 8px;margin:0;">Menu</p>
      <a href="../index.html" class="sidebar-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Trang chủ</a>
      <a href="duyet-cong.html" class="sidebar-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Duyệt công</a>
      <a href="danh-sach-phieu-nghi.html" class="sidebar-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><polyline points="9 15 11 17 15 13"/></svg>Duyệt phép</a>
      <a href="danh-sach-nhan-vien.html" class="sidebar-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Nhân viên</a>
      <a href="lich-lam-viec.html" class="sidebar-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Lịch làm việc</a>
      <a href="chia-ca.html" class="sidebar-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Đăng ký ca</a>
      <div style="margin:8px 4px;border-top:1px solid #EAEFF4;"></div>
      <a href="xem-phep-ton.html" class="sidebar-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Xem phép tồn</a>
      <a href="xem-thu-nhap.html" class="sidebar-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Xem thu nhập</a>
      <a href="hop-thu.html" class="sidebar-item active"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Hộp thư</a>
    </nav>
  </aside>

  <!-- TOPBAR -->
  <header class="topbar">
    <div style="flex:1;max-width:460px;">
      <div style="display:flex;align-items:center;gap:10px;background:#F2F6FA;border:1px solid #e5eaef;border-radius:7px;padding:9px 16px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#7C8FAC" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" placeholder="Tìm kiếm trong hộp thư..." oninput="onSearch()" style="background:transparent;border:none;outline:none;font-size:13px;color:#2A3547;flex:1;font-family:inherit;" />
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <button style="position:relative;padding:10px;border-radius:7px;background:transparent;border:none;cursor:pointer;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2A3547" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span id="notifDot" style="display:none;position:absolute;top:8px;right:8px;width:8px;height:8px;background:#ef4444;border-radius:50%;border:2px solid white;"></span>
      </button>
      <div style="width:1px;height:32px;background:#e5eaef;"></div>
      <div style="position:relative;">
        <div onclick="toggleUserDropdown()" style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 10px;border-radius:7px;user-select:none;" id="topbarUserBtn">
          <img id="topbarAvatar" src="https://i.pravatar.cc/32?img=47" alt="" style="width:32px;height:32px;border-radius:50%;border:2px solid #ECF2FF;" />
          <div>
            <p id="topbarName" style="font-size:13px;font-weight:600;color:#2A3547;margin:0;line-height:1.2;">—</p>
            <p id="topbarRole" style="font-size:11px;color:#7C8FAC;margin:0;">—</p>
          </div>
          <svg id="topbarChevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7C8FAC" stroke-width="2" style="margin-left:4px;transition:transform 0.2s;">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
        <div id="userDropdown" style="display:none;position:absolute;top:calc(100% + 8px);right:0;width:220px;background:white;border:1px solid #e5eaef;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.10);z-index:999;overflow:hidden;">
          <div style="padding:14px 16px;border-bottom:1px solid #F2F6FA;display:flex;align-items:center;gap:10px;">
            <img id="dropdownAvatar" src="https://i.pravatar.cc/36?img=47" alt="" style="width:36px;height:36px;border-radius:50%;border:2px solid #ECF2FF;flex-shrink:0;" />
            <div>
              <p id="dropdownName" style="font-size:13px;font-weight:700;color:#2A3547;margin:0;line-height:1.3;">—</p>
              <p id="dropdownRole" style="font-size:11px;color:#7C8FAC;margin:0;">—</p>
            </div>
          </div>
          <div style="padding:6px;">
            <a href="cai-dat.html" style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;font-size:13px;color:#2A3547;text-decoration:none;transition:background 0.12s;" onmouseover="this.style.background='#F2F6FA'" onmouseout="this.style.background='transparent'">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5A6A85" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
              Cài đặt
            </a>
            <div style="height:1px;background:#F2F6FA;margin:4px 0;"></div>
            <button onclick="doLogout()" style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;font-size:13px;color:#ef4444;width:100%;border:none;background:transparent;cursor:pointer;font-family:inherit;transition:background 0.12s;" onmouseover="this.style.background='#fef2f2'" onmouseout="this.style.background='transparent'">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Đăng xuất
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main-content fade-in">
    <div class="inbox-layout">

      <!-- Left: message list -->
      <div class="inbox-list">
        <!-- Header -->
        <div style="padding:12px 18px;border-bottom:1px solid #e5eaef;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
          <span id="listTitle" style="font-size:14px;font-weight:800;color:#2A3547;">Hộp thư đến</span>
          <div style="display:flex;align-items:center;gap:6px;">
            <span id="unreadBadge" style="background:var(--primary);color:white;font-size:11px;font-weight:700;padding:2px 8px;border-radius:7px;display:none;">0</span>
            <button class="btn-primary" style="padding:6px 12px;font-size:12px;" onclick="openCompose()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Soạn
            </button>
          </div>
        </div>
        <!-- Tabs -->
        <div style="display:flex;border-bottom:1px solid #e5eaef;padding:0 6px;flex-shrink:0;overflow-x:auto;align-items:center;">
          <div class="tab active" data-tab="all" onclick="switchTab('all')">Tất cả</div>
          <div class="tab" data-tab="unread" onclick="switchTab('unread')">Chưa đọc <span id="unreadTabBadge" style="background:#ef4444;color:white;font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:3px;display:none;"></span></div>
          <div class="tab" data-tab="important" onclick="switchTab('important')">Quan trọng</div>
          <div class="tab" data-tab="sent" onclick="switchTab('sent')">Đã gửi</div>
          <button onclick="toggleAdvSearch()" id="advSearchToggle" title="Tìm kiếm nâng cao" style="margin-left:auto;margin-right:6px;width:28px;height:28px;border-radius:6px;background:transparent;border:1px solid #e5eaef;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;" onmouseover="this.style.background='#F2F6FA'" onmouseout="this.style.background='transparent'">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="11" y2="6"/><line x1="16" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="4" y1="12" x2="5" y2="12"/><line x1="11" y1="18" x2="20" y2="18"/><line x1="4" y1="18" x2="8" y2="18"/></svg>
          </button>
        </div>
        <!-- Advanced search panel (hidden by default) -->
        <div id="advSearchPanel" style="display:none;padding:10px 14px;background:#F2F6FA;border-bottom:1px solid #e5eaef;flex-shrink:0;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
            <div>
              <label style="font-size:10.5px;font-weight:700;color:#5A6A85;display:block;margin-bottom:3px;">TỪ NGÀY</label>
              <input type="date" id="filterFrom" style="width:100%;border:1px solid #e5eaef;border-radius:6px;padding:6px 8px;font-size:12px;color:#2A3547;font-family:inherit;outline:none;background:white;" oninput="renderList()">
            </div>
            <div>
              <label style="font-size:10.5px;font-weight:700;color:#5A6A85;display:block;margin-bottom:3px;">ĐẾN NGÀY</label>
              <input type="date" id="filterTo" style="width:100%;border:1px solid #e5eaef;border-radius:6px;padding:6px 8px;font-size:12px;color:#2A3547;font-family:inherit;outline:none;background:white;" oninput="renderList()">
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <select id="filterMsgType" style="flex:1;border:1px solid #e5eaef;border-radius:6px;padding:6px 8px;font-size:12px;color:#2A3547;font-family:inherit;outline:none;background:white;cursor:pointer;" onchange="applyMsgTypeFilter()">
              <option value="">Tất cả loại</option>
              <option value="inbox">Hộp thư đến</option>
              <option value="sent">Đã gửi</option>
            </select>
            <button onclick="clearAdvSearch()" style="font-size:11.5px;color:#7C8FAC;background:none;border:none;cursor:pointer;font-family:inherit;white-space:nowrap;padding:4px 0;">Xóa bộ lọc</button>
          </div>
        </div>
        <!-- Messages (rendered by JS) -->
        <div id="msgList" style="flex:1;overflow-y:auto;"></div>
      </div>

      <!-- Right: message detail -->
      <div class="inbox-detail" id="msgDetail">
        <div id="detailEmpty" class="empty-state">
          <div style="width:64px;height:64px;border-radius:20px;background:#f5f3ff;display:flex;align-items:center;justify-content:center;">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <p style="font-size:14px;font-weight:700;color:#2A3547;margin:0;">Chọn tin nhắn để xem</p>
          <p style="font-size:13px;color:#7C8FAC;margin:0;">Nhấn vào tin nhắn bên trái để đọc nội dung</p>
        </div>
        <div id="msgContentPanel" style="display:none;padding:24px;"></div>
      </div>
    </div>
  </main>
</div>

<!-- COMPOSE MODAL -->
<div id="composeModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeCompose()">
  <div class="modal-box">
    <div class="modal-header">
      <span style="font-size:15px;font-weight:800;color:#2A3547;">Soạn tin nhắn mới</span>
      <button onclick="closeCompose()" style="background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;color:#7C8FAC;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:14px;">
      <div>
        <label class="form-label">Người nhận <span style="color:#ef4444;">*</span></label>
        <select id="composeToId" class="form-input">
          <option value="">— Chọn người nhận —</option>
        </select>
      </div>
      <div>
        <label class="form-label">Chủ đề <span style="color:#ef4444;">*</span></label>
        <input id="composeSubject" class="form-input" placeholder="Nhập chủ đề tin nhắn..." />
      </div>
      <div>
        <label class="form-label">Nhãn</label>
        <select id="composeTag" class="form-input">
          <option value="general">Chung</option>
          <option value="attendance">Duyệt công</option>
          <option value="leave">Nghỉ phép</option>
          <option value="shift">Đổi ca</option>
          <option value="salary">Lương</option>
          <option value="report">Báo cáo</option>
        </select>
      </div>
      <div>
        <label class="form-label">Nội dung <span style="color:#ef4444;">*</span></label>
        <textarea id="composeBody" class="form-input" placeholder="Nhập nội dung tin nhắn..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeCompose()">Hủy</button>
      <button class="btn-primary" onclick="sendMessage()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Gửi tin nhắn
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../js/hop-thu.js"></script>
</body>
</html>
