<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Humi – Đăng nhập</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="db.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{font-family:'Plus Jakarta Sans', sans-serif;box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100vh;background:linear-gradient(135deg,#ECF2FF 0%,#f0f2f8 50%,#dbeafe 100%);display:flex;align-items:center;justify-content:center;}
    .card{background:white;border-radius:24px;box-shadow:0 20px 60px rgba(93,135,255,0.12);padding:40px;width:420px;max-width:calc(100vw - 32px);}
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center;}
    .logo-mark{width:40px;height:40px;border-radius:7px;background:linear-gradient(135deg,#5D87FF,#4570EA);display:flex;align-items:center;justify-content:center;}
    .logo-text{font-size:26px;font-weight:800;letter-spacing:-0.5px;color:#2A3547;}
    h2{font-size:20px;font-weight:800;color:#2A3547;margin-bottom:6px;}
    .sub{font-size:13px;color:#7C8FAC;margin-bottom:28px;}
    .form-group{margin-bottom:16px;}
    label{font-size:12px;font-weight:600;color:#2A3547;display:block;margin-bottom:6px;}
    input{width:100%;border:1.5px solid #e5eaef;border-radius:7px;padding:11px 14px;font-size:14px;color:#2A3547;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s;}
    input:focus{border-color:#5D87FF;box-shadow:0 0 0 3px rgba(93,135,255,.08);}
    .input-wrap{position:relative;}
    .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#7C8FAC;padding:4px;}
    .error-msg{font-size:12px;color:#dc2626;margin-top:8px;display:none;}
    .error-msg.show{display:block;}
    .btn{width:100%;background:linear-gradient(135deg,#5D87FF,#4570EA);color:white;border:none;border-radius:7px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit;transition:opacity .15s;letter-spacing:.02em;}
    .btn:hover{opacity:.9;}
    .btn:disabled{opacity:.6;cursor:not-allowed;}
    .hint{background:#f5f3ff;border-radius:7px;padding:12px 14px;margin-top:20px;}
    .hint p{font-size:12px;color:#5A6A85;line-height:1.6;margin:0;}
    .hint strong{color:#5D87FF;}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    </div>
    <span class="logo-text">Humi</span>
  </div>
  <h2>Chào mừng trở lại!</h2>
  <p class="sub">Đăng nhập để tiếp tục quản lý nhân sự</p>

  <form id="loginForm" onsubmit="doLogin(event)">
    <div class="form-group">
      <label for="empId">Mã nhân viên</label>
      <input id="empId" type="text" placeholder="VD: NV000005" autocomplete="username" />
    </div>
    <div class="form-group">
      <label for="pwd">Mật khẩu</label>
      <div class="input-wrap">
        <input id="pwd" type="password" placeholder="Nhập mật khẩu" autocomplete="current-password" />
        <button type="button" class="eye-btn" onclick="togglePwd()">
          <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <p class="error-msg" id="errMsg"></p>
    </div>
    <button class="btn" type="submit" id="loginBtn">Đăng nhập</button>
  </form>

  <div class="hint">
    <p><strong>Tài khoản demo:</strong><br>
    Quản lý: <strong>NV000011</strong> / <strong>123456</strong><br>
    Nhân viên: <strong>NV000001</strong> / <strong>123456</strong></p>
  </div>
</div>

<script>
  // Redirect if already logged in
  if (DB.auth.getSession()) location.href = 'index.html';

  function togglePwd() {
    const i = document.getElementById('pwd');
    const icon = document.getElementById('eyeIcon');
    if (i.type === 'password') {
      i.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      i.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errMsg');
    const empId = document.getElementById('empId').value.trim().toUpperCase();
    const pwd = document.getElementById('pwd').value;

    err.classList.remove('show');
    if (!empId) { err.textContent='Vui lòng nhập mã nhân viên'; err.classList.add('show'); return; }
    if (!pwd)   { err.textContent='Vui lòng nhập mật khẩu'; err.classList.add('show'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Đang đăng nhập...';

    setTimeout(() => {
      const res = DB.auth.login(empId, pwd);
      if (res.ok) {
        location.href = 'index.html';
      } else {
        err.textContent = res.error;
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Đăng nhập';
      }
    }, 600);
  }

  // Enter key support
  document.getElementById('empId').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('pwd').focus(); });
</script>
</body>
</html>
