<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Humi – Đăng nhập</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    </div>
    <span class="logo-text">Humi</span>
  </div>
  <h2>Chào mừng trở lại!</h2>
  <p class="sub">Đăng nhập để tiếp tục quản lý nhân sự</p>

  <form id="loginForm" onsubmit="doLogin(event)">
    <div class="form-group">
      <label for="empId">Mã nhân viên</label>
      <input id="empId" type="text" placeholder="VD: NV000005" autocomplete="username" />
    </div>
    <div class="form-group">
      <label for="pwd">Mật khẩu</label>
      <div class="input-wrap">
        <input id="pwd" type="password" placeholder="Nhập mật khẩu" autocomplete="current-password" />
        <button type="button" class="eye-btn" onclick="togglePwd()">
          <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <p class="error-msg" id="errMsg"></p>
    </div>
    <button class="btn" type="submit" id="loginBtn">Đăng nhập</button>
  </form>

  <div class="hint">
    <p><strong>Tài khoản demo:</strong><br>
    Quản lý: <strong>NV000011</strong> / <strong>123456</strong><br>
    Nhân viên: <strong>NV000001</strong> / <strong>123456</strong></p>
  </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
