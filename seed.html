    ['requests',        'employee_id'],

    ['work_shifts',     'employee_id'],
    ['accounts',        'employee_id'],
    ['employees',       'id'],
    ['shifts',          'id'],
  ];
  for (const [tbl, col] of dels) {
    const { error } = await sb.from(tbl).delete().neq(col, '__none__');
    if (error) log('err', `Xoá ${tbl}: ${error.message}`);

  }
}

// ── Generate attendance ────────────────────────────────────────
function buildAttendance() {
  const records = [];
  const activeEmps = Object.keys(EMP_SHIFT); // excludes NV000008, NV000015

  // date range: 2026-02-01 to 2026-04-26
  const start = new Date('2026-02-01');
  const end   = new Date('2026-04-26');

  for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
    const dow = d.getDay(); // 0=Sun
    if (dow === 0) continue; // skip Sunday

    const yr  = d.getFullYear();
    const mo  = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    const dateStr = `${yr}-${mo}-${day}`;

    // approvalStatus logic
    let approvalStatus;
    if (yr === 2026 && d.getMonth()+1 <= 2) approvalStatus = 'approved';
    else if (yr === 2026 && d.getMonth()+1 === 3 && d.getDate() <= 25) approvalStatus = 'approved';
    else approvalStatus = 'pending';

    for (const empId of activeEmps) {
      if (LEAVE_SKIP.has(`${empId}:${dateStr}`)) continue;

      // pseudo-random scenario
      const hash = empId.charCodeAt(5) * 31 + d.getDate() * 17 + (d.getMonth()+1) * 7;
      const scenario = hash % 20;

      if (scenario === 0) continue; // absent (~5%)

      const shiftId = EMP_SHIFT[empId];
      const times   = SHIFT_TIMES[shiftId];
      let checkIn, checkOut, status, note = '';

      if (scenario === 1 || scenario === 2) {
        // Late
        const lateMap = {SH001:'08:14',SH002:'13:18',SH004:'08:12',SH005:'15:11'};
        checkIn  = lateMap[shiftId] || times.in;
        checkOut = times.out;
        status   = 'late';
        note     = 'Vào muộn';
      } else if (scenario === 3) {
        // Early leave
        const earlyMap = {SH001:'16:45',SH002:'21:42',SH004:'12:50',SH005:'21:40'};
        checkIn  = times.in;
        checkOut = earlyMap[shiftId] || times.out;
        status   = 'early_leave';
        note     = 'Ra sớm';
      } else if (scenario === 4) {
        // Missing check-out
        checkIn  = times.in;
        checkOut = null;
        status   = 'missing_checkout';
        note     = 'Quên chấm ra';
      } else {
        // Normal
        checkIn  = times.in;
        checkOut = times.out;
        status   = 'present';
      }

      // Overtime: scenario 5 on Saturdays for some employees
      if (dow === 6 && scenario === 5 && (empId === 'NV000001' || empId === 'NV000005' || empId === 'NV000007')) {
        checkOut = shiftId === 'SH001' ? '19:00' : '00:00';
        note = 'Tăng ca';
      }

      records.push({
        id:              `att_${empId}_${dateStr}`,
        employee_id:     empId,
        shift_id:        shiftId,
        date:            dateStr,
        check_in:        checkIn,
        check_out:       checkOut,
        status:          status,
        approval_status: approvalStatus,
        note:            note,
        face_image_in:   null,
        face_image_out:  null,
        approver_id:     approvalStatus === 'approved' ? (empId.startsWith('NV0000') && parseInt(empId.slice(6)) <= 7 ? 'NV000011' : (parseInt(empId.slice(6)) <= 10 ? 'NV000012' : 'NV000013')) : null,
        approved_at:     approvalStatus === 'approved' ? new Date(d.getTime() + 86400000).toISOString() : null,
        approved_check_in:  null,
        approved_check_out: null,
        approver_note:   null,
      });
    }
  }
  return records;
}

  const start = new Date('2026-02-01');  // khớp với lịch chấm công

  for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {

    if (dow === 0) continue;
    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    for (const empId of activeEmps) {
      records.push({ id:`sa_${empId}_${dateStr}`, employee_id:empId, shift_id:EMP_SHIFT[empId], date:dateStr });
    }
  }
  return records;
}

// ── Salary ─────────────────────────────────────────────────────
function buildSalary() {
  const records = [];
  const BASE = { manager:15000000, employee:7500000, part_time:4500000, probation:6375000 };
  const MEAL = 730000, TRANSPORT = 500000, PHONE_MGR = 300000;

  const periods = ['2026-01','2026-02','2026-03'];
  const empList = employees.filter(e => e.role_id !== 'admin' && e.status !== 'inactive');

  for (const emp of empList) {
    let base;
    if (emp.role_id === 'manager') base = BASE.manager;
    else if (emp.work_mode === 'Bán thời gian') base = BASE.part_time;
    else if (emp.contract_type === 'Hợp đồng thử việc') base = BASE.probation;
    else base = BASE.employee;

    const allow = emp.role_id === 'manager'
      ? { meal:MEAL, transport:TRANSPORT, dien_thoai:PHONE_MGR }
      : { meal:MEAL, transport:TRANSPORT };
    const totalAllow = Object.values(allow).reduce((a,b)=>a+b,0);

    for (const period of periods) {
      const isMgr = emp.role_id === 'manager';
      const bhxh  = Math.round(base * 0.08);
      const bhyt  = Math.round(base * 0.015);
      const bhtn  = Math.round(base * 0.01);
      const tax   = isMgr ? Math.round((base + totalAllow - 11000000) * 0.05) : 0;
      const totalDeduct = bhxh + bhyt + bhtn + (tax > 0 ? tax : 0);

      // Jan: Tết bonus for non-probation employees with > 1 year tenure
      const startYear = parseInt((emp.start_date||'2099-01-01').split('-')[0]);
      const tetBonus = period === '2026-01' && startYear <= 2024 && emp.contract_type !== 'Hợp đồng thử việc'
        ? (isMgr ? 4000000 : 2500000) : 0;

      // Mar: overtime for some employees
      const ot = period === '2026-03' && (emp.id==='NV000001'||emp.id==='NV000005'||emp.id==='NV000007') ? 350000 : 0;

      // NV000008 (thai sản): Feb and Mar receive 75% of base from BHXH fund
      const isMaternity = emp.id === 'NV000008' && (period === '2026-02' || period === '2026-03');
      const effectiveBase = isMaternity ? Math.round(base * 0.75) : base;
      const gross = effectiveBase + totalAllow + tetBonus + ot;
      const net   = gross - totalDeduct;

      const workDays = period === '2026-01' ? 26 : period === '2026-02' ? 24 : 26;
      let actualWorkDays;
      if (isMaternity)          actualWorkDays = 0;
      else if (emp.id==='NV000003' && period==='2026-02') actualWorkDays = 22; // rejected sick leave, was absent
      else                      actualWorkDays = workDays - (period === '2026-03' && emp.id==='NV000012' ? 3 : 0);

      records.push({
        id:               `SAL_${emp.id}_${period}`,
        employee_id:      emp.id,
        period:           period,
        base_salary:      effectiveBase,
        gross_salary:     gross,
        net_salary:       net < 0 ? 0 : net,
        work_days:        workDays,
        actual_work_days: actualWorkDays,
        allowances:       allow,
        deductions:       { bhxh, bhyt, bhtn, ...(tax>0?{thue_tncn:tax}:{}) },
        bonus:            tetBonus,
        overtime_pay:     ot,
      });
    }
  }
  return records;
}

// ── Batch upsert ───────────────────────────────────────────────
async function batchUpsert(table, rows, batchSize = 100) {
  let count = 0;
  for (let i = 0; i < rows.length; i += batchSize) {
    const chunk = rows.slice(i, i + batchSize);
    const { error } = await sb.from(table).upsert(chunk);
    if (error) { log('err', `${table} batch ${i/batchSize+1}: ${error.message}`); }
    else { count += chunk.length; }
  }
  return count;
}

// ── Main seed ──────────────────────────────────────────────────
async function runSeed() {
  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').textContent = '⏳ Đang chạy...';
  initUI();

  try {
    // STEP 0 – Delete all
    stepRun(0);
    await deleteAll();
    stepDone(0);

    // STEP 1 – Employees
    stepRun(1);
    const c1 = await batchUpsert('employees', employees);
    stepDone(1, c1);

    // STEP 2 – Accounts
    stepRun(2);
    const c2 = await batchUpsert('accounts', accounts);
    stepDone(2, c2);

    // STEP 3 – Shifts
    stepRun(3);
    const c3 = await batchUpsert('shifts', shifts);
    stepDone(3, c3);

    // STEP 4 – Shift assignments
    stepRun(4);
    const sa = buildShiftAssignments();
    log('info', `Phân ca: ${sa.length} bản ghi (Feb 1 – Jun 30)`);
    const c4 = await batchUpsert('shift_assignments', sa, 200);
    stepDone(4, c4);

    // STEP 5 – Attendance
    stepRun(5);
    const att = buildAttendance();
    log('info', `Chấm công: ${att.length} bản ghi (Feb–Apr 26)`);
    const c5 = await batchUpsert('attendance', att, 200);
    stepDone(5, c5);

    // STEP 6 – Leave requests
    stepRun(6);
    const c6 = await batchUpsert('leave_requests', leaveRequests);
    stepDone(6, c6);

    // STEP 7 – Requests
    stepRun(7);
    const c7 = await batchUpsert('requests', requests);
    stepDone(7, c7);

    // STEP 8 – Salary
    stepRun(8);
    const sal = buildSalary();
    log('info', `Lương: ${sal.length} kỳ lương`);
    const c8 = await batchUpsert('salary', sal);
    stepDone(8, c8);

    // STEP 9 – Announcements
    stepRun(9);
    const c9 = await batchUpsert('announcements', announcements);
    stepDone(9, c9);

    // STEP 10 – Messages
    stepRun(10);
    const c10 = await batchUpsert('messages', messages);
    stepDone(10, c10);

    // STEP 11 – localStorage sync
    stepRun(11);
    // Accounts (không sync từ Supabase → set trực tiếp)
    const localAccounts = accounts.map(a => ({ employeeId: a.employee_id, password: a.password }));
    localStorage.setItem('humi_accounts', JSON.stringify(localAccounts));

    // Employees
    const localEmps = employees.map(e => ({
      id:e.id, code:e.code, name:e.name, avatar:e.avatar, unit:e.unit,
      position:e.position, roleId:e.role_id, status:e.status, gender:e.gender,
      phone:e.phone, email:e.email, dob:e.dob, startDate:e.start_date,
      contractStatus:e.contract_status, contractType:e.contract_type,
      workMode:e.work_mode, managerName:e.manager_name, managerId:e.manager_id,
      leaveBalance:e.leave_balance, idCard:e.id_card,
      faceImage:null, faceDescriptor:null
    }));
    localStorage.setItem('humi_employees', JSON.stringify(localEmps));

    // Shifts
    const localShifts = shifts.map(s => ({
      id:s.id, name:s.name, code:s.code, startTime:s.start_time, endTime:s.end_time,
      breakMinutes:s.break_minutes, workHours:s.work_hours, quota:s.quota,
      active:s.active, color:s.color, applyDays:s.apply_days
    }));
    localStorage.setItem('humi_shifts', JSON.stringify(localShifts));

    // Leave requests
    const localLR = leaveRequests.map(r => ({
      id:r.id, employeeId:r.employee_id, leaveType:r.leave_type, leaveTypeName:r.leave_type_name,
      startDate:r.start_date, endDate:r.end_date, totalDays:r.total_days, status:r.status,
      reason:r.reason, approverId:r.approver_id, approvedAt:r.approved_at,
      rejectedAt:r.rejected_at, rejectReason:r.reject_reason, createdAt:r.created_at
    }));
    localStorage.setItem('humi_leave_requests', JSON.stringify(localLR));

    // Requests
    const localReq = requests.map(r => ({
      id:r.id, employeeId:r.employee_id, type:r.request_type, typeLabel:r.type_label,
      content:r.content, status:r.status, approverId:r.approver_id, createdAt:r.created_at
    }));
    localStorage.setItem('humi_requests', JSON.stringify(localReq));

    // Salary
    const sal2 = buildSalary();
    const localSal = sal2.map(s => ({
      id:s.id, employeeId:s.employee_id, period:s.period,
      baseSalary:s.base_salary, grossSalary:s.gross_salary, netSalary:s.net_salary,
      workDays:s.work_days, actualWorkDays:s.actual_work_days,
      allowances:s.allowances, deductions:s.deductions,
      bonus:s.bonus, overtimePay:s.overtime_pay
    }));
    localStorage.setItem('humi_salary', JSON.stringify(localSal));

    // Announcements
    const localAnn = announcements.map(a => ({
      id:a.id, department:a.department, title:a.title, preview:a.preview,
      creator:a.creator, approver:a.approver, status:a.status,
      startDate:a.start_date, endDate:a.end_date
    }));
    localStorage.setItem('humi_announcements', JSON.stringify(localAnn));

    // Messages
    const tagMap = { attendance:'Duyệt công', leave:'Nghỉ phép', salary:'Lương', shift:'Đổi ca', report:'Báo cáo', system:'Hệ thống', general:'Chung' };
    const clsMap = { attendance:'tag-orange', leave:'tag-blue', salary:'tag-green', shift:'tag-purple', report:'tag-green', system:'tag-gray', general:'tag-purple' };
    const localMsg = messages.map(m => {
      const rawTag = m.tags[0] || '';
      return {
        id:m.id, toId:m.to_id, fromId:m.from_id, sender:m.from_name,
        avatar:'', subject:m.subject,
        preview:m.body.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim().slice(0,120),
        body:m.body, actions:[], tag:tagMap[rawTag]||rawTag,
        tagClass:clsMap[rawTag]||'tag-purple', isRead:m.is_read,
        important:m.important, deleted:m.deleted, timestamp:m.timestamp
      };
    });
    localStorage.setItem('humi_messages', JSON.stringify(localMsg));

    // Attendance & shift_assignments (large – skip localStorage, let syncFromSupabase handle)
    localStorage.removeItem('humi_attendance');
    localStorage.removeItem('humi_shift_assignments');

    // Xóa avatar khỏi user_settings của tất cả nhân viên
    employees.forEach(function(e) {
      var sk = 'humi_user_settings_' + e.id;
      try {
        var st = JSON.parse(localStorage.getItem(sk) || '{}');
        delete st.avatar;
        localStorage.setItem(sk, JSON.stringify(st));
      } catch(_) {}
    });

    // Xóa avatar khỏi session hiện tại nếu có
    try {
      var sess = JSON.parse(localStorage.getItem('humi_session') || 'null');
      if (sess && sess.user) { sess.user.avatar = ''; localStorage.setItem('humi_session', JSON.stringify(sess)); }
    } catch(_) {}

    // Mark seeded
    localStorage.setItem('humi_seeded_v6', '1');

    log('ok', 'localStorage đã được cập nhật đầy đủ');
    stepDone(11);

    setProgress(100);
    document.getElementById('summary').style.display = 'block';
    log('ok', '=== SEED HOÀN THÀNH ===');

  } catch (err) {
    log('err', 'Lỗi nghiêm trọng: ' + err.message);
    document.getElementById('startBtn').disabled = false;
    document.getElementById('startBtn').textContent = '▶ Thử lại';
  }
}

initUI();
</script>
