<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Humi HRM — Test Sheet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#2A3547;font-size:13px;}
.header{background:linear-gradient(135deg,#5D87FF,#4338ca);color:white;padding:28px 32px;}
.header h1{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.header p{font-size:13px;opacity:.8;margin-top:4px;}
.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:20px 32px;background:white;border-bottom:1px solid #e5eaef;}
.sum-card{text-align:center;padding:12px;border-radius:10px;background:#F2F6FA;}
.sum-card .val{font-size:28px;font-weight:800;}
.sum-card .lbl{font-size:11px;color:#7C8FAC;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.sum-card.total .val{color:#2A3547;}
.sum-card.pass .val{color:#16a34a;}
.sum-card.fail .val{color:#ef4444;}
.sum-card.na .val{color:#7C8FAC;}
.sum-card.pct .val{color:#5D87FF;}
.progress-bar{height:6px;background:#e5eaef;margin:0 32px 0;border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#5D87FF,#16a34a);border-radius:99px;transition:width .4s;}
.toolbar{display:flex;gap:8px;padding:14px 32px;background:white;border-bottom:1px solid #e5eaef;align-items:center;flex-wrap:wrap;}
.toolbar button{padding:7px 14px;border-radius:7px;border:1px solid #e5eaef;background:white;cursor:pointer;font-size:12px;font-weight:600;color:#5A6A85;font-family:inherit;}
.toolbar button:hover{background:#F2F6FA;}
.toolbar button.btn-p{background:#5D87FF;color:white;border-color:#5D87FF;}
.toolbar button.btn-f{background:#ef4444;color:white;border-color:#ef4444;}
.toolbar button.btn-n{background:#7C8FAC;color:white;border-color:#7C8FAC;}
.toolbar .spacer{flex:1;}
.toolbar .filter-lbl{font-size:12px;color:#7C8FAC;}
.content{padding:24px 32px;max-width:1400px;}
.module{background:white;border-radius:14px;margin-bottom:20px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.mod-header{padding:16px 20px;border-bottom:1px solid #e5eaef;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.mod-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.mod-title{font-size:14px;font-weight:700;}
.mod-sub{font-size:11px;color:#7C8FAC;margin-top:1px;}
.mod-badge{margin-left:auto;display:flex;gap:6px;}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;}
.badge-p{background:#dcfce7;color:#16a34a;}
.badge-f{background:#fee2e2;color:#ef4444;}
.badge-n{background:#f1f5f9;color:#7C8FAC;}
.mod-toggle{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:#7C8FAC;transition:transform .2s;margin-left:8px;}
.mod-toggle.open{transform:rotate(180deg);}
.mod-body{display:none;}
.mod-body.open{display:block;}
table{width:100%;border-collapse:collapse;}
thead th{padding:10px 16px;text-align:left;font-size:10px;font-weight:700;color:#7C8FAC;letter-spacing:.08em;text-transform:uppercase;background:#F2F6FA;border-bottom:1px solid #e5eaef;}
tbody tr{border-bottom:1px solid #f5f5f8;}
tbody tr:hover{background:#fafbfd;}
tbody td{padding:10px 16px;vertical-align:middle;}
.tc-id{font-size:11px;color:#7C8FAC;font-weight:700;white-space:nowrap;}
.tc-name{font-weight:600;color:#2A3547;}
.tc-steps{font-size:11px;color:#5A6A85;line-height:1.5;margin-top:3px;}
.tc-expect{font-size:11px;color:#16a34a;margin-top:3px;}
.tc-priority{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;}
.pri-high{background:#fee2e2;color:#dc2626;}
.pri-med{background:#fef9c3;color:#a16207;}
.pri-low{background:#f0fdf4;color:#16a34a;}
.result-cell{white-space:nowrap;}
.radio-group{display:flex;gap:4px;}
.radio-btn{padding:5px 10px;border-radius:6px;border:1.5px solid #e5eaef;cursor:pointer;font-size:11px;font-weight:700;background:white;transition:all .12s;font-family:inherit;}
.radio-btn:hover{border-color:#5D87FF;color:#5D87FF;}
.radio-btn.pass{background:#dcfce7;border-color:#16a34a;color:#16a34a;}
.radio-btn.fail{background:#fee2e2;border-color:#ef4444;color:#ef4444;}
.radio-btn.na{background:#f1f5f9;border-color:#7C8FAC;color:#7C8FAC;}
.notes-input{width:100%;padding:5px 8px;border:1px solid #e5eaef;border-radius:6px;font-size:11px;font-family:inherit;color:#2A3547;resize:none;}
.notes-input:focus{outline:none;border-color:#5D87FF;}
.row-pass td{background:#f0fdf4;}
.row-fail td{background:#fff1f2;}
.row-na td{background:#f8fafc;}
@media print{
  .toolbar,.progress-bar{display:none;}
  .summary{border:1px solid #e5eaef;}
  .mod-body{display:block!important;}
  .radio-group{display:none;}
  body{background:white;}
}
.section-label{font-size:10px;font-weight:700;color:#7C8FAC;letter-spacing:.1em;text-transform:uppercase;padding:8px 16px 4px;background:#fafbfd;border-bottom:1px solid #f5f5f8;}
</style>
</head>
<body>

<div class="header">
  <h1>Humi HRM — Test Sheet</h1>
  <p>Bảng kiểm thử toàn bộ hệ thống · Ngày: <span id="testDate"></span> · Người thực hiện: ___________________</p>
</div>

<div class="summary">
  <div class="sum-card total"><div class="val" id="sTotal">0</div><div class="lbl">Tổng test case</div></div>
  <div class="sum-card pass"><div class="val" id="sPass">0</div><div class="lbl">Pass</div></div>
  <div class="sum-card fail"><div class="val" id="sFail">0</div><div class="lbl">Fail</div></div>
  <div class="sum-card na"><div class="val" id="sNA">0</div><div class="lbl">N/A</div></div>
  <div class="sum-card pct"><div class="val" id="sPct">—</div><div class="lbl">Pass Rate</div></div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div class="toolbar">
  <button onclick="setAll('pass')" class="btn-p">✓ Pass tất cả</button>
  <button onclick="setAll('fail')" class="btn-f">✗ Fail tất cả</button>
  <button onclick="clearAll()">↺ Reset</button>
  <button onclick="expandAll()">▼ Mở tất cả</button>
  <button onclick="collapseAll()">▲ Thu tất cả</button>
  <div class="spacer"></div>
  <span class="filter-lbl">Lọc:</span>
  <button onclick="filterRows('all')" id="fAll" class="btn-p">Tất cả</button>
  <button onclick="filterRows('fail')" id="fFail">Chỉ Fail</button>
  <button onclick="filterRows('empty')" id="fEmpty">Chưa test</button>
  <button onclick="window.print()">🖨 In</button>
</div>

<div class="content" id="content"></div>

<script>
var testDate = new Date();
document.getElementById('testDate').textContent =
  String(testDate.getDate()).padStart(2,'0') + '/' +
  String(testDate.getMonth()+1).padStart(2,'0') + '/' + testDate.getFullYear();

// ═══════════════════════════════════════════
// TEST DATA
// ═══════════════════════════════════════════
var MODULES = [
{
  id:'M01', title:'Đăng nhập / Xác thực', icon:'🔐', color:'#EEF2FF',
  cases:[
    {id:'TC001',name:'Đăng nhập thành công với tài khoản hợp lệ',pri:'high',
     steps:'1. Mở login.html\n2. Nhập mã NV và mật khẩu đúng\n3. Nhấn Đăng nhập',

     steps:'1. Nhập mã NV đúng, mật khẩu sai\n2. Nhấn Đăng nhập',
     expect:'Hiện thông báo lỗi đỏ "Mật khẩu không đúng", không chuyển trang'},
    {id:'TC003',name:'Đăng nhập thất bại — mã NV không tồn tại',pri:'high',
     steps:'1. Nhập mã NV không tồn tại\n2. Nhấn Đăng nhập',
     expect:'Hiện thông báo lỗi, không chuyển trang'},
    {id:'TC004',name:'Truy cập trang nội bộ khi chưa đăng nhập',pri:'high',
     steps:'1. Xóa localStorage\n2. Truy cập thẳng index.html',
     expect:'Tự động redirect về login.html'},
    {id:'TC005',name:'Đăng xuất',pri:'high',
     steps:'1. Đang đăng nhập\n2. Click avatar → Đăng xuất',
     expect:'Xóa session, redirect về login.html'},
    {id:'TC006',name:'Nhân viên thường bị chặn trang manager',pri:'high',
     steps:'1. Đăng nhập bằng tài khoản employee\n2. Vào thẳng URL duyet-cong.html',
     expect:'Redirect về index.html ngay lập tức'},
  ]
},
{
  id:'M02', title:'Dashboard (Trang chủ)', icon:'🏠', color:'#F0FDF4',
  cases:[
    {id:'TC007',name:'Hiển thị thông tin người dùng đúng',pri:'high',
     steps:'1. Đăng nhập\n2. Xem topbar và sidebar',

    {id:'TC008',name:'Thống kê cá nhân (ngày công, phép tồn)',pri:'med',

    {id:'TC009',name:'Danh sách thông báo công ty',pri:'med',

    {id:'TC010',name:'Widget hộp thư',pri:'med',

     expect:'Hiển thị đúng thư, badge số chưa đọc chính xác'},
    {id:'TC011',name:'Chấm công (check-in/check-out)',pri:'high',

     expect:'Ghi nhận giờ vào/ra, trạng thái cập nhật đúng'},
    {id:'TC012',name:'Dashboard manager — thống kê tổng quan',pri:'high',
     steps:'1. Đăng nhập bằng tài khoản manager\n2. Xem phần "Tổng quan công ty"',
     expect:'Hiển thị 4 card: Nhân viên, Có mặt hôm nay, Đơn nghỉ, Tăng ca chờ'},
    {id:'TC013',name:'Dashboard manager — ẩn với nhân viên thường',pri:'high',
     steps:'1. Đăng nhập bằng tài khoản employee\n2. Xem trang chủ',
     expect:'Không thấy section "Tổng quan công ty"'},
    {id:'TC014',name:'Sidebar — ẩn menu manager với employee',pri:'high',
     steps:'1. Đăng nhập tài khoản employee\n2. Xem sidebar',
     expect:'"Duyệt công", "Duyệt phép", "Nhân viên" bị ẩn khỏi sidebar'},
    {id:'TC015',name:'Đồng hồ thời gian thực',pri:'low',
     steps:'1. Xem phần đồng hồ bên phải\n2. Đợi 3 giây',
     expect:'Giờ:phút:giây cập nhật liên tục'},
  ]
},
{
  id:'M03', title:'Duyệt công', icon:'⏱', color:'#FFF7ED',
  cases:[
    {id:'TC016',name:'Xem bảng chấm công nhân viên',pri:'high',
     steps:'1. Đăng nhập manager\n2. Vào Duyệt công',
     expect:'Bảng hiển thị danh sách nhân viên và ca làm việc theo tuần'},
    {id:'TC017',name:'Duyệt một ca chấm công',pri:'high',
     steps:'1. Click ô chấm công pending\n2. Nhấn nút Duyệt',
     expect:'Trạng thái chuyển sang "Đã duyệt", màu xanh'},
    {id:'TC018',name:'Từ chối một ca chấm công',pri:'high',
     steps:'1. Click ô pending\n2. Nhấn Từ chối\n3. Nhập lý do',
     expect:'Trạng thái chuyển "Bị từ chối", nhân viên nhận thông báo'},
    {id:'TC019',name:'Duyệt hàng loạt theo điều kiện',pri:'high',

     expect:'Modal xác nhận xuất hiện trước khi thực hiện'},
    {id:'TC021',name:'Chuyển tuần trước/sau',pri:'med',

    {id:'TC022',name:'Lọc theo ca / đơn vị',pri:'med',
     steps:'1. Dùng bộ lọc chọn ca hoặc đơn vị\n2. Nhấn Áp dụng',

    {id:'TC023',name:'Nhân viên không truy cập được trang',pri:'high',
     steps:'1. Đăng nhập employee\n2. Vào URL duyet-cong.html',
     expect:'Redirect về index.html'},
  ]
},
{
  id:'M04', title:'Duyệt phép (Phiếu nghỉ)', icon:'📋', color:'#F0FDF4',
  cases:[
    {id:'TC024',name:'Xem danh sách đơn nghỉ chờ duyệt',pri:'high',
     steps:'1. Đăng nhập manager\n2. Vào Duyệt phép',
     expect:'Hiển thị đơn nghỉ có trạng thái Pending'},
    {id:'TC025',name:'Duyệt đơn nghỉ',pri:'high',
     steps:'1. Click vào đơn\n2. Nhấn Duyệt',
     expect:'Trạng thái → Đã duyệt, nhân viên nhận thông báo'},
    {id:'TC026',name:'Từ chối đơn nghỉ kèm lý do',pri:'high',
     steps:'1. Click đơn → Từ chối\n2. Nhập lý do',
     expect:'Trạng thái → Từ chối, lý do được lưu'},
    {id:'TC027',name:'Lọc đơn theo loại nghỉ / đơn vị',pri:'med',
     steps:'1. Dùng filter chọn loại\n2. Nhấn lọc',
     expect:'Chỉ hiện đơn phù hợp'},
    {id:'TC028',name:'Duyệt hàng loạt với confirm dialog',pri:'high',
     steps:'1. Nhấn "Duyệt theo điều kiện"\n2. Chọn điều kiện → Duyệt tất cả',
     expect:'Confirm dialog xuất hiện, sau OK thực hiện duyệt'},
  ]
},
{
  id:'M05', title:'Quản lý nhân viên (Danh sách)', icon:'👥', color:'#EEF2FF',

     expect:'Chỉ hiện NV thuộc đơn vị đó'},
    {id:'TC032',name:'Lọc theo trạng thái',pri:'med',

{
  id:'M06', title:'Hồ sơ nhân viên (Drawer)', icon:'🗂', color:'#FDF4FF',

{
  id:'M07', title:'Lịch làm việc', icon:'📅', color:'#F0FDF4',

    {id:'TC048',name:'Chuyển tháng trước/sau',pri:'med',

// RENDER

var totalCases = 0;
MODULES.forEach(function(m){ totalCases += m.cases.length; });
document.getElementById('sTotal').textContent = totalCases;

var content = document.getElementById('content');
MODULES.forEach(function(mod) {
  var modEl = document.createElement('div');
  modEl.className = 'module';
  modEl.id = 'mod_' + mod.id;

  var header = '<div class="mod-header" onclick="toggleModule(\'' + mod.id + '\')">'
    + '<div class="mod-icon" style="background:' + mod.color + '">' + mod.icon + '</div>'
    + '<div><div class="mod-title">' + mod.id + ' — ' + mod.title + '</div>'
    + '<div class="mod-sub">' + mod.cases.length + ' test case</div></div>'
    + '<div class="mod-badge">'
    + '<span class="badge badge-p" id="badge_p_' + mod.id + '">0 Pass</span>'
    + '<span class="badge badge-f" id="badge_f_' + mod.id + '">0 Fail</span>'
    + '<span class="badge badge-n" id="badge_n_' + mod.id + '">0 N/A</span>'
    + '</div>'
    + '<div class="mod-toggle" id="toggle_' + mod.id + '">▼</div>'
    + '</div>';

  var table = '<div class="mod-body" id="body_' + mod.id + '">'
    + '<table><thead><tr>'
    + '<th style="width:80px">ID</th>'
    + '<th>Tên test case & Mô tả</th>'
    + '<th style="width:70px">Độ ưu tiên</th>'
    + '<th style="width:160px">Kết quả</th>'
    + '<th>Ghi chú / Bug</th>'
    + '</tr></thead><tbody>';

  mod.cases.forEach(function(tc) {
    var priCls = tc.pri === 'high' ? 'pri-high' : tc.pri === 'med' ? 'pri-med' : 'pri-low';
    var priLbl = tc.pri === 'high' ? 'Cao' : tc.pri === 'med' ? 'Trung bình' : 'Thấp';
    table += '<tr id="row_' + tc.id + '">'
      + '<td class="tc-id">' + tc.id + '</td>'
      + '<td><div class="tc-name">' + tc.name + '</div>'
      + '<div class="tc-steps">' + tc.steps.replace(/\n/g,'<br>') + '</div>'
      + '<div class="tc-expect">✓ ' + tc.expect + '</div></td>'
      + '<td><span class="tc-priority ' + priCls + '">' + priLbl + '</span></td>'
      + '<td class="result-cell"><div class="radio-group">'
      + '<button class="radio-btn" id="p_' + tc.id + '" onclick="setResult(\'' + tc.id + '\',\'pass\')">Pass</button>'
      + '<button class="radio-btn" id="f_' + tc.id + '" onclick="setResult(\'' + tc.id + '\',\'fail\')">Fail</button>'
      + '<button class="radio-btn" id="n_' + tc.id + '" onclick="setResult(\'' + tc.id + '\',\'na\')">N/A</button>'
      + '</div></td>'
      + '<td><textarea class="notes-input" id="note_' + tc.id + '" rows="2" placeholder="Ghi chú lỗi..."></textarea></td>'
      + '</tr>';
  });

  table += '</tbody></table></div>';
  modEl.innerHTML = header + table;
  content.appendChild(modEl);
});

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
var results = {};

function setResult(tcId, val) {
  results[tcId] = val;
  // Update row style
  var row = document.getElementById('row_' + tcId);
  row.className = val === 'pass' ? 'row-pass' : val === 'fail' ? 'row-fail' : val === 'na' ? 'row-na' : '';
  // Update buttons
  ['pass','fail','na'].forEach(function(r) {
    var btn = document.getElementById((r === 'pass' ? 'p' : r === 'fail' ? 'f' : 'n') + '_' + tcId);
    btn.className = 'radio-btn' + (val === r ? ' ' + r : '');
  });
  updateSummary();
}

function updateSummary() {
  var pass = 0, fail = 0, na = 0;
  Object.values(results).forEach(function(r){ if(r==='pass') pass++; else if(r==='fail') fail++; else if(r==='na') na++; });
  document.getElementById('sPass').textContent = pass;
  document.getElementById('sFail').textContent = fail;
  document.getElementById('sNA').textContent = na;
  var done = pass + fail + na;
  var pct = done > 0 ? Math.round(pass / (pass + fail) * 100) : 0;
  document.getElementById('sPct').textContent = (pass+fail) > 0 ? pct + '%' : '—';
  var fillPct = totalCases > 0 ? (done / totalCases * 100) : 0;
  document.getElementById('progressFill').style.width = fillPct + '%';

  // Update module badges
  MODULES.forEach(function(mod) {
    var p = 0, f = 0, n = 0;
    mod.cases.forEach(function(tc) {
      var r = results[tc.id];
      if (r === 'pass') p++; else if (r === 'fail') f++; else if (r === 'na') n++;
    });
    document.getElementById('badge_p_' + mod.id).textContent = p + ' Pass';
    document.getElementById('badge_f_' + mod.id).textContent = f + ' Fail';
    document.getElementById('badge_n_' + mod.id).textContent = n + ' N/A';
  });
}

function toggleModule(modId) {
  var body = document.getElementById('body_' + modId);
  var toggle = document.getElementById('toggle_' + modId);
  var isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  toggle.textContent = isOpen ? '▼' : '▲';
}

function expandAll() {
  MODULES.forEach(function(m) {
    document.getElementById('body_' + m.id).classList.add('open');
    document.getElementById('toggle_' + m.id).textContent = '▲';
  });
}
function collapseAll() {
  MODULES.forEach(function(m) {
    document.getElementById('body_' + m.id).classList.remove('open');
    document.getElementById('toggle_' + m.id).textContent = '▼';
  });
}

function setAll(val) {
  MODULES.forEach(function(mod) {
    mod.cases.forEach(function(tc) { setResult(tc.id, val); });
  });
}
function clearAll() {
  results = {};
  MODULES.forEach(function(mod) {
    mod.cases.forEach(function(tc) {
      document.getElementById('row_' + tc.id).className = '';
      ['p','f','n'].forEach(function(p) {
        var id = p + '_' + tc.id;
        document.getElementById(id).className = 'radio-btn';
      });
      var note = document.getElementById('note_' + tc.id);
      if (note) note.value = '';
    });
  });
  updateSummary();
}

function filterRows(mode) {
  expandAll();
  MODULES.forEach(function(mod) {
    mod.cases.forEach(function(tc) {
      var row = document.getElementById('row_' + tc.id);
      var res = results[tc.id];
      if (mode === 'all') row.style.display = '';
      else if (mode === 'fail') row.style.display = (res === 'fail') ? '' : 'none';
      else if (mode === 'empty') row.style.display = (!res) ? '' : 'none';
    });
  });
}

// Auto-open first module
document.getElementById('body_M01').classList.add('open');
document.getElementById('toggle_M01').textContent = '▲';
</script>
